[package]
name = "freally-cli"
description = "Phase 36 — `freally` command-line interface. Stable JSON-Lines output, declarative TOML jobspec with idempotent plan/apply, and 9 documented exit codes for CI/CD pipelines."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true
# Phase 17g — Linux RELRO/NOW/noexecstack flags emitted via build.rs.
build = "build.rs"

[lints]
workspace = true

[[bin]]
name = "freally"
path = "src/main.rs"

[dependencies]
# Phase 36 — clap 4 with derive macros powers the whole CLI surface
# (subcommands + flags + help). Default features include the `color`
# / `usage` / `error-context` set we want for human-readable
# `--help`. MIT/Apache-2.0.
clap = { version = "4", features = ["derive", "env", "wrap_help"] }
# Phase 36 — `clap_complete` emits per-shell completion scripts
# from the same clap definition. Driven by the `completions <shell>`
# subcommand. MIT/Apache-2.0.
clap_complete = "4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
# Phase 36 — declarative job specs are TOML. Same workspace-pinned
# version freally-settings already uses (Phase 42 dep-audit bumped
# 0.8 → 0.9 to keep one `toml` resolution across the workspace).
toml = "0.9"
thiserror = "2"
tokio = { version = "1", features = [
    "fs",
    "io-util",
    "macros",
    "rt",
    "rt-multi-thread",
    # Phase 48 — `freally serve` blocks on Ctrl-C via tokio::signal.
    "signal",
    "sync",
    "time",
] }
# Phase 36 — wraps the engine for `freally copy` / `move` / `verify`.
freally-core = { path = "../freally-core", version = "0.19" }
# Phase 48 — `freally serve` headless WebDAV/HTTP server mode.
freally-server = { path = "../freally-server", version = "0.19" }
# Phase 50 — `freally migrate` / `export` use the CDR-0 reference
# implementation + repository-format detector.
freally-chunk = { path = "../freally-chunk", version = "0.19" }
freally-hash = { path = "../freally-hash", version = "0.19" }
# Phase 39 — attach `PlatformFastCopyHook` so the CLI's `copy`
# subcommand uses the same `CopyFileExW` + parallel-chunk + reflink
# fast paths as the GUI shell, instead of falling back to the
# pure-Rust async loop. Same engine, same numbers — bench parity.
freally-platform = { path = "../freally-platform", version = "0.19" }
freally-settings = { path = "../freally-settings", version = "0.19" }
# Phase 38 follow-up — `freally copy --shape RATE` wires through
# Shape + FreallyShapeSink so the CLI honours bandwidth caps.
freally-shape = { path = "../freally-shape", version = "0.19" }
# Phase 36 — `freally history` reads the same SQLite table as the GUI.
freally-history = { path = "../freally-history", version = "0.19" }
# Phase 43 — `freally provenance verify / keygen` wraps the
# manifest verifier + ed25519 keygen helpers from
# `freally-provenance`.
freally-provenance = { path = "../freally-provenance", version = "0.19" }
# Phase 36 — UTC timestamps in the JSON event stream. Workspace already
# carries chrono indirectly; explicit dep here keeps the surface small.
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }

[dev-dependencies]
tempfile = "3"
assert_cmd = "2"
predicates = "3"

[[test]]
name = "phase_36_cli"
path = "../../tests/smoke/phase_36_cli.rs"

# Phase 17g — binary hardening flag tripwire. Filesystem-only:
# asserts workspace [profile.release] uses fat LTO + panic=abort,
# the CLI build.rs emits Linux RELRO/NOW flags, the Tauri build.rs
# carries the same, and SECURITY.md documents Phase 17g as shipped.
[[test]]
name = "phase_17g_hardening"
path = "../../tests/smoke/phase_17g_hardening.rs"

# Phase 14d — scheduled-job render. Drives freally_cli::schedule
# against Windows / macOS / Linux host targets, exercises the
# Phase 17a path-safety bar at the renderer's entry, and asserts
# the rejection paths for relative paths / unsupported job kinds /
# missing [schedule] block.
[[test]]
name = "phase_14d_schedule"
path = "../../tests/smoke/phase_14d_schedule.rs"

# Phase 14f — queue-while-locked / volume-arrival watcher. Drives
# the polling loop with a scripted probe so the test owns the
# transition timeline; covers Arrival / Departure / cancellation /
# Phase 17a traversal rejection.
[[test]]
name = "phase_14f_queue_locked"
path = "../../tests/smoke/phase_14f_queue_locked.rs"
