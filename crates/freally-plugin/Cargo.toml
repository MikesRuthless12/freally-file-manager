[package]
name = "freally-plugin"
description = "Phase 46 — sandboxed WASM plugin runtime for post-copy hooks. Plugins receive lifecycle callbacks (BeforeJob / BeforeFile / AfterFile / AfterJob / OnError) and return a HookOutcome that the engine respects (Continue / SkipFile / AbortJob / Notify)."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish.workspace = true

[lints]
workspace = true

[dependencies]
# Phase 46.1 — `HookCtx` + `HookOutcome` cross the WASM ABI boundary as
# JSON so plugins can be written in any WASM-emitting language without
# a custom binding generator. `serde_json::Value` lets sub-phase 46.2
# extend the schema without breaking the public type surface.
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Phase 46.1 — typed plugin errors. Same crate used by every other
# workspace member (freally-core, freally-recovery, …) so the
# error-handling style stays uniform.
thiserror = "2"

# Phase 46.4 — `plugin.toml` manifest parser. `0.9` matches every
# other workspace consumer (freally-cli, freally-cloud,
# freally-mobile, freally-settings, the Tauri shell) so the lock
# graph stays single-version.
#
# (Wall-clock budget enforcement — `Engine::increment_epoch()` driven
# by a 1ms ticker — uses a `std::thread` rather than a tokio task so
# `PluginHost::new` is callable outside a tokio runtime. Wasmtime-wasi
# is deferred until 46.5, when the shipped sample plugins start
# importing actual WASI preview1 functions; pulling it in now would
# add a heavy dep with no in-tree consumer.)
toml = "0.9"

# Phase 46.2 / 46.3 — WASM engine. Apache-2.0 WITH LLVM-exception
# (already on the deny.toml allow list). 46.3 pruned to a minimal
# feature set: `cranelift` for the JIT, `runtime` for the engine,
# `wat` for the smoke tests, `async` so per-call sandbox budgets
# (fuel, memory limiter) can yield cooperatively. Dropped:
# `component-model`, `gc`, `threads`, `pooling-allocator`,
# `parallel-compilation`, `cache`, `addr2line`, `coredump`,
# `profiling`, `wmemcheck`, `debug-builtins` — none are needed by
# the post-copy-hook ABI and they all add build time + binary
# weight.
wasmtime = { version = "44", default-features = false, features = ["cranelift", "runtime", "wat", "async"] }

[dev-dependencies]
# Phase 46.1 scaffold smoke uses `#[tokio::test]` to exercise the
# async `PluginHandle::call_hook` surface. `rt` + `macros` is the
# minimum runtime needed for the single-threaded test executor.
tokio = { version = "1", features = ["macros", "rt"] }
# Phase 46.2 dispatch smoke writes the WAT plugin to a tempfile so
# `PluginHost::load_plugin` exercises the real path-based load API.
tempfile = "3"
