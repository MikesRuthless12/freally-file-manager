name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Phase 18 — manual trigger so any branch can be validated on demand
  # even when the head commit carries `[skip ci]`. Fire from the Actions
  # tab → CI → Run workflow.
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Free tier on a private repo gives 2 000 Action minutes/month, with
  # Windows runners billed 2× and macOS runners billed 10×. The matrix
  # below burns roughly 150–200 billable minutes per push. Trim jobs or
  # narrow the matrix if monthly usage approaches the cap.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  i18n-lint:
    name: i18n key parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask --release -- i18n-lint

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  # Phase 17b — RustSec advisories + yank surveillance, layered on top
  # of cargo-deny. cargo-deny already screens advisories via its
  # `[advisories]` section, but cargo-audit's database refresh is more
  # frequent and surfaces yanks the deny job classifies as warnings
  # rather than failures. Treat cargo-audit's output as a richer second
  # pass — fail on Critical/High, warn on Medium/Low.
  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        # The `--ignore` flags mirror the `[advisories] ignore` block
        # in deny.toml so the two surfaces stay in lockstep. Update
        # both atomically when adding/removing an exception. The
        # Phase 17b smoke test (`tests/smoke/phase_17b_supply_chain.rs`)
        # walks deny.toml and asserts every entry appears here too —
        # silent drift breaks the build before merge.
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2021-0119 \
            --ignore RUSTSEC-2025-0026 \
            --ignore RUSTSEC-2021-0154 \
            --ignore RUSTSEC-2020-0168 \
            --ignore RUSTSEC-2025-0052 \
            --ignore RUSTSEC-2024-0411 \
            --ignore RUSTSEC-2024-0412 \
            --ignore RUSTSEC-2024-0413 \
            --ignore RUSTSEC-2024-0414 \
            --ignore RUSTSEC-2024-0415 \
            --ignore RUSTSEC-2024-0416 \
            --ignore RUSTSEC-2024-0417 \
            --ignore RUSTSEC-2024-0418 \
            --ignore RUSTSEC-2024-0419 \
            --ignore RUSTSEC-2024-0420 \
            --ignore RUSTSEC-2024-0429 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2026-0173 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2025-0075 \
            --ignore RUSTSEC-2025-0080 \
            --ignore RUSTSEC-2025-0081 \
            --ignore RUSTSEC-2025-0098 \
            --ignore RUSTSEC-2025-0100 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0097 \
            --ignore RUSTSEC-2026-0194 \
            --ignore RUSTSEC-2026-0195

  # Phase 17b — supply-chain trust audits via cargo-vet. Tagged
  # releases require a vet-clean tree; on every push we run the
  # check non-blocking to surface drift early. The vet config and
  # imports live in `supply-chain/` (Mozilla / Google / Embark trust
  # imports + per-crate audit decisions).
  cargo-vet:
    name: cargo-vet (supply-chain audit)
    runs-on: ubuntu-latest
    # Vet exceptions accumulate as new transitive deps land; we don't
    # want a single un-vetted dep to red-X every PR while the audit
    # backlog catches up. Enforced on tagged releases via release.yml.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-vet
        run: cargo install --locked cargo-vet
      - name: Run cargo vet
        run: cargo vet --locked

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # This job does two full workspace compiles (clippy --all-targets, then
    # cargo test --workspace --no-fail-fast) plus the heavy phase_18_e2e suite,
    # so it legitimately runs ~30-40 min warm — or ~50-55 min COLD, e.g. the
    # first run after a stable-toolchain bump (rust 1.94 -> 1.96) evicts every
    # Swatinem/rust-cache entry and forces a full recompile. Cap at 65 so a
    # genuine hang still fails fast without cancelling a healthy cold run (the
    # 50-min cap cancelled the ubuntu leg mid-Test on the 1.96 bump).
    timeout-minutes: 65
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/freally-central (the "More Freally apps" panel) is a submodule.
          submodules: recursive
      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The clippy(--all-targets) + test(--workspace) debug compiles fill the
      # ubuntu runner's ~14 GB free disk and abort the Test step with "No space
      # left on device". Reclaim ~25 GB of preinstalled SDKs we never use.
      - name: Free disk space (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
          df -h /
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # `cargo test --workspace` picks up every per-phase smoke via
      # each crate's [[test]] registration — including the Phase 17a
      # red-team (`phase_17_security`) and the Phase 18 engine-level
      # end-to-end (`phase_18_e2e`, 50 files + BLAKE3 verify + history
      # round-trip + shred_tree; ~60 s on Windows, faster on
      # Linux / macOS). Tauri-build coverage is in the tauri-build job
      # below; install / uninstall round-trip runs against the tagged
      # release artifacts per docs/RELEASE_CHECKLIST.md, not here.
      - name: Test
        run: cargo test --workspace
      # Phase 17d — the elevated-handshake smoke is behind the
      # `spawn-tests` feature (it spawns the real freally-helper binary
      # NON-elevated over the DACL pipe / Unix socket and drives the full
      # handshake), so `cargo test --workspace` above doesn't run it.
      # Run it explicitly on every OS. The actual UAC/polkit/osascript
      # consent prompt is still manual — this covers the wire path only.
      - name: Test (Phase 17d elevated-handshake smoke)
        run: cargo test -p freally-helper --features spawn-tests --test phase_17d_spawn

  tauri-build:
    name: Tauri debug build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Tauri debug build typically completes in 2-10 minutes with a warm
    # Swatinem/rust-cache. First-run / evicted-cache builds on ubuntu-latest
    # routinely need 25-35 minutes (apt-get install + webkit2gtk headers
    # + ~350 Rust crates + pnpm install + frontend bundling), which was
    # enough to cancel the Phase 18 PR #3 CI run at the old 30-min cap.
    # Raise to 45 to cover the cold path while still failing fast on a
    # true runner glitch.
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          # vendor/freally-central (the "More Freally apps" panel) is a submodule.
          submodules: recursive
      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/freally-ui/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/freally-ui/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: apps/freally-ui
        run: pnpm install --frozen-lockfile
      # Debug build skips the rpm target on ubuntu-latest — Tauri's
      # `rpmbuild` shells out silently for ~25 min on hosted runners
      # (no stdout during GPG/host-key resolution), which pushed the
      # Phase 18 PR #3 CI run 24799604751 past the 45-min cap even
      # though every other step finished in under 15 min. The
      # tagged release.yml workflow still produces rpm artifacts
      # with its own 60-min cap. The host-matched bundle list
      # (msi+nsis on Windows, app+dmg on macOS, appimage+deb on
      # Linux) keeps CI fast without losing smoke coverage — the
      # Tauri bundler itself runs identically across targets.
      - name: Tauri build (debug — Linux subset)
        if: matrix.os == 'ubuntu-latest'
        working-directory: apps/freally-ui
        # Compile-only check with `--no-bundle`: this verifies the Rust
        # + frontend build without producing a signed updater artifact,
        # so no TAURI_SIGNING_* key is required, and the deb/appimage
        # bundling that exhausts runner disk is skipped. Full bundling
        # and signing stay verified at release time by release.yml.
        run: pnpm tauri build --debug --no-bundle
      - name: Tauri build (debug)
        if: matrix.os != 'ubuntu-latest'
        working-directory: apps/freally-ui
        # See the Linux subset step above — `--no-bundle` keeps this a
        # compile-only check, so no signing key is needed here.
        run: pnpm tauri build --debug --no-bundle

  # Phase 7 follow-up — REAL Nautilus-runtime load test for the GNOME
  # Files extension. Runs inside ubuntu:20.04, which ships the Nautilus
  # 3.0 GIR typelib the extension targets (`gi.require_version("Nautilus",
  # "3.0")`); ubuntu-latest has 4.x and would fail the require_version.
  # This closes the runtime-discoverability gap the static
  # tests/smoke/phase_07_shell_linux.sh check deliberately punts on —
  # it imports the extension against the live typelib, instantiates the
  # provider, and verifies the two menu items. See tests/smoke/nautilus/.
  nautilus-runtime:
    name: nautilus runtime load (GNOME Files extension)
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Nautilus 3.0 typelib + PyGObject
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            python3 python3-gi gir1.2-nautilus-3.0
      - name: Load the extension against the real Nautilus typelib
        env:
          FREALLY_NAUTILUS_DIR: packaging/linux/nautilus
        run: python3 tests/smoke/nautilus/nautilus_runtime_check.py
