name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Free tier on a private repo gives 2 000 Action minutes/month, with
  # Windows runners billed 2× and macOS runners billed 10×. The matrix
  # below burns roughly 150–200 billable minutes per push. Trim jobs or
  # narrow the matrix if monthly usage approaches the cap.

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  i18n-lint:
    name: i18n key parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p xtask --release -- i18n-lint

  cargo-deny:
    name: cargo-deny (licenses + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          log-level: warn
          command: check
          arguments: --all-features

  clippy-test:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Earlier Phase 3+4 runs hit GitHub's default 6-hour job timeout on every
    # OS — almost certainly a runner glitch rather than a real test deadlock.
    # Cap at 30 min so a true hang fails fast and we can investigate, instead
    # of burning a runner for hours.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # `cargo test --workspace` picks up every per-phase smoke via
      # each crate's [[test]] registration — including the Phase 17a
      # red-team (`phase_17_security`) and the Phase 18 engine-level
      # end-to-end (`phase_18_e2e`, 50 files + BLAKE3 verify + history
      # round-trip + shred_tree; ~60 s on Windows, faster on
      # Linux / macOS). Tauri-build coverage is in the tauri-build job
      # below; install / uninstall round-trip runs against the tagged
      # release artifacts per docs/RELEASE_CHECKLIST.md, not here.
      - name: Test
        run: cargo test --workspace

  tauri-build:
    name: Tauri debug build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Tauri debug build typically completes in 2-10 minutes; cap at 30 to
    # match the clippy-test cap and protect against the same runner-glitch
    # mode that hung Phase 3+4 for 6 hours.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/copythat-ui/src-tauri
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/copythat-ui/pnpm-lock.yaml
      - name: Install frontend deps
        working-directory: apps/copythat-ui
        run: pnpm install --frozen-lockfile
      - name: Tauri build (debug)
        working-directory: apps/copythat-ui
        run: pnpm tauri build --debug
