# Phase 16 — Release (free-first).
#
# Triggered by tags matching v*.*.* (e.g. v0.1.0). Builds platform
# installers on the three free GitHub-hosted runners and uploads them
# to a GitHub Release. The workflow deliberately does NOT depend on
# any paid service, code-signing certificate, or Apple Developer
# membership:
#
# - Windows: MSI + NSIS, unsigned. SmartScreen reputation clears the
#   binary after ~100 downloads. Winget manifests (under
#   packaging/windows/winget) provide tamper-proof install via hash.
# - macOS:   .app + .dmg, ad-hoc signed (APPLE_SIGNING_IDENTITY=-).
#   Gatekeeper: users right-click → Open on first launch.
# - Linux:   AppImage + .deb + .rpm. GPG self-sign is optional and
#   gated on a GPG key being provided in GH secrets; absence does not
#   fail the build.
#
# Paid-signing upgrade paths (Azure Trusted Signing, Apple Developer
# notarization) live as commented-out jobs at the bottom. Enabling
# them is a secret-management change, not a code change. See
# docs/SIGNING_UPGRADE.md.
name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Dry-run tag (e.g. v0.1.0-dev); creates artifacts only"
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target.label }})
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            label: linux-x86_64
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - os: macos-latest
            label: macos-aarch64
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
          # Cross-compile the Intel build on the Apple Silicon runner instead
          # of the chronically-scarce macos-13 runner (it sat 12 h queued on the
          # first release attempt). rustup installs the x86_64-apple-darwin std
          # below, so `tauri build --target x86_64-apple-darwin` produces the
          # Intel .app/.dmg on the reliable macos-latest host — full Intel +
          # Apple Silicon coverage with no runner-scarcity hang.
          - os: macos-latest
            label: macos-x86_64
            rust-target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            label: windows-x86_64
            rust-target: x86_64-pc-windows-msvc
            bundles: msi,nsis
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri prerequisites
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/freally-ui/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/freally-ui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/freally-ui
        run: pnpm install --frozen-lockfile

      - name: Tauri build (release, ${{ matrix.target.bundles }})
        working-directory: apps/freally-ui
        env:
          # Ad-hoc codesign for macOS (free — no Apple Developer cert).
          # The dash identity tells codesign to stamp a self-contained
          # signature. Gatekeeper still shows the right-click-Open
          # prompt on first launch, but the bundle runs on any machine
          # after that one click. See docs/SIGNING_UPGRADE.md for the
          # paid-Notary upgrade path.
          APPLE_SIGNING_IDENTITY: "-"
          # Free (ed25519 / minisign) updater signing. With these set
          # and `bundle.createUpdaterArtifacts: true`, `tauri build`
          # emits a signed updater bundle plus a `.sig` and per-target
          # `latest.json` for the publish-updater-manifest job to merge.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target.rust-target }} --bundles ${{ matrix.target.bundles }}

      - name: Collect Windows artifacts
        if: matrix.target.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-staging | Out-Null
          Get-ChildItem -Recurse `
            "target/${{ matrix.target.rust-target }}/release/bundle" `
            -Include *.msi,*.exe,*.zip,*.sig,latest.json `
            -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination release-staging }
          # Per-target manifest name so the four runners don't collide on
          # the release; publish-updater-manifest merges them into one.
          $lj = Join-Path release-staging latest.json
          if (Test-Path $lj) { Move-Item -Force $lj (Join-Path release-staging "latest-${{ matrix.target.label }}.json") }

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-staging
          BUNDLE="target/${{ matrix.target.rust-target }}/release/bundle"
          # DMG is already arch-named (…_aarch64.dmg / …_x64.dmg) — copy as-is.
          find "$BUNDLE" -type f -name "*.dmg" -exec cp {} release-staging/ \; || true
          # The updater bundle (*.app.tar.gz) + its .sig share an arch-agnostic
          # name across the two mac legs, so they'd collide on upload and only
          # one arch's updater artifact would survive. Rename both to include the
          # runner label so each arch is preserved; the manifest job points
          # darwin-aarch64 / darwin-x86_64 at the matching file.
          find "$BUNDLE" -type f -name "*.app.tar.gz" | while read -r f; do
            base="$(basename "$f" .app.tar.gz)"
            cp "$f" "release-staging/${base}.${{ matrix.target.label }}.app.tar.gz"
            [ -f "$f.sig" ] && cp "$f.sig" "release-staging/${base}.${{ matrix.target.label }}.app.tar.gz.sig"
          done

      - name: Collect Linux artifacts
        if: matrix.target.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p release-staging
          # NOTE: no bare *.tar.gz — the .deb build leaves control.tar.gz /
          # data.tar.gz internals in the bundle tree that a broad glob scoops up
          # as junk. The Linux updater artifact is the .AppImage (+ .sig).
          find "target/${{ matrix.target.rust-target }}/release/bundle" \
            -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.sig" \) \
            -exec cp {} release-staging/ \; || true

      - name: Linux GPG sign (optional, skipped if no key)
        if: matrix.target.os == 'ubuntu-latest'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        shell: bash
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "No GPG_SIGNING_KEY secret; skipping detached signatures (this is the free-first default)."
            exit 0
          fi
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          for f in release-staging/*.AppImage release-staging/*.deb release-staging/*.rpm; do
            [ -e "$f" ] || continue
            gpg --batch --yes --detach-sign --armor "$f"
          done

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            release-staging/*

      - name: Upload build artifacts (dry-run)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: freally-${{ matrix.target.label }}
          path: release-staging/
          if-no-files-found: ignore

  # Updater-manifest publishing job. The updater endpoint configured in
  # tauri.conf.json is the GitHub Release asset
  # `…/releases/latest/download/latest.json`, so each runner's per-target
  # `latest-<label>.json` (uploaded by the build job) is merged here into
  # one universal `latest.json` and uploaded back to the same release.
  # Requires TAURI_SIGNING_PRIVATE_KEY + TAURI_SIGNING_PRIVATE_KEY_PASSWORD
  # repo secrets so the build job's bundles are signed (see that job's
  # env). Tracked in docs/SIGNING_UPGRADE.md.
  publish-updater-manifest:
    name: Publish updater manifest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Generate latest.json from the signed release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # `tauri build` (unlike tauri-action) emits the updater bundle + a
          # detached `.sig` per target but NOT a latest.json. Generate one here
          # from the signed assets already on the release: pull every `.sig`,
          # then for each platform pick the artifact the Tauri updater downloads,
          # read its signature, and record the asset's real GitHub download URL.
          mkdir -p _sig
          gh release download "$TAG" -R "$REPO" --pattern '*.sig' --dir _sig --clobber
          ls -la _sig
          python3 - <<'PYEOF'
          import json, os, pathlib, subprocess, sys

          tag = os.environ["TAG"]; repo = os.environ["REPO"]
          version = tag.lstrip("v")

          # Real browser download URLs for every asset on the release.
          assets = json.loads(subprocess.check_output(
              ["gh", "release", "view", tag, "-R", repo, "--json", "assets"]))["assets"]
          url_by_name = {a["name"]: a["url"] for a in assets}

          # The Tauri-updater download target per platform, matched by the tail of
          # the uploaded asset name (GitHub turns spaces into dots). Windows uses
          # the NSIS setup.exe; Linux the AppImage; macOS the per-arch app.tar.gz
          # the Collect step renamed with the runner label.
          wanted = {
              "windows-x86_64": "-setup.exe",
              "linux-x86_64":   ".AppImage",
              "darwin-aarch64": "macos-aarch64.app.tar.gz",
              "darwin-x86_64":  "macos-x86_64.app.tar.gz",
          }

          def resolve(suffix):
              names = sorted(n for n in url_by_name
                             if n.endswith(suffix) and not n.endswith(".sig"))
              if not names:
                  return None
              name = names[0]
              sig = pathlib.Path("_sig") / (name + ".sig")
              if not sig.exists():
                  return None
              return {"signature": sig.read_text().strip(), "url": url_by_name[name]}

          platforms = {}
          for key, suffix in wanted.items():
              entry = resolve(suffix)
              if entry:
                  platforms[key] = entry
              else:
                  print(f"WARN: no signed updater artifact for {key} ({suffix})",
                        file=sys.stderr)

          # Fail loud rather than ship a manifest missing platforms — an installed
          # client on a missing platform would treat the release as "no update".
          if len(platforms) != len(wanted):
              print(f"FATAL: resolved {len(platforms)}/{len(wanted)} platforms: "
                    f"{sorted(platforms)}", file=sys.stderr)
              sys.exit(1)

          out = {
              "version": version,
              "notes": f"Freally File Manager {tag}. See CHANGELOG.md for details.",
              "pub_date": "",
              "platforms": platforms,
          }
          pathlib.Path("latest.json").write_text(json.dumps(out, indent=2))
          print(json.dumps(out, indent=2))
          PYEOF
      - name: Upload latest.json to the GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: gh release upload "$TAG" latest.json --clobber -R "$REPO"

  # ------------------------------------------------------------------
  # Paid-signing upgrade hooks. Keep commented until revenue justifies
  # the subscription; the upgrade is a secret-management change plus
  # un-commenting a job, not a code change. Matches the guidance in
  # docs/SIGNING_UPGRADE.md.
  # ------------------------------------------------------------------

