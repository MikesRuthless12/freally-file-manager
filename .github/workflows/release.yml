# Phase 16 — Release (free-first).
#
# Triggered by tags matching v*.*.* (e.g. v0.1.0). Builds platform
# installers on the three free GitHub-hosted runners and uploads them
# to a GitHub Release. The workflow deliberately does NOT depend on
# any paid service, code-signing certificate, or Apple Developer
# membership:
#
# - Windows: MSI + NSIS, unsigned. SmartScreen reputation clears the
#   binary after ~100 downloads. Winget manifests (under
#   packaging/windows/winget) provide tamper-proof install via hash.
# - macOS:   .app + .dmg, ad-hoc signed (APPLE_SIGNING_IDENTITY=-).
#   Gatekeeper: users right-click → Open on first launch.
# - Linux:   AppImage + .deb + .rpm. GPG self-sign is optional and
#   gated on a GPG key being provided in GH secrets; absence does not
#   fail the build.
#
# Paid-signing upgrade paths (Azure Trusted Signing, Apple Developer
# notarization) live as commented-out jobs at the bottom. Enabling
# them is a secret-management change, not a code change. See
# docs/SIGNING_UPGRADE.md.
name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Dry-run tag (e.g. v0.1.0-dev); creates artifacts only"
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target.label }})
    runs-on: ${{ matrix.target.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            label: linux-x86_64
            rust-target: x86_64-unknown-linux-gnu
            bundles: deb,rpm,appimage
          - os: macos-latest
            label: macos-aarch64
            rust-target: aarch64-apple-darwin
            bundles: app,dmg
          - os: macos-13
            label: macos-x86_64
            rust-target: x86_64-apple-darwin
            bundles: app,dmg
          - os: windows-latest
            label: windows-x86_64
            rust-target: x86_64-pc-windows-msvc
            bundles: msi,nsis
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Tauri prerequisites
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust-target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            apps/copythat-ui/src-tauri

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/copythat-ui/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: apps/copythat-ui
        run: pnpm install --frozen-lockfile

      - name: Tauri build (release, ${{ matrix.target.bundles }})
        working-directory: apps/copythat-ui
        env:
          # Ad-hoc codesign for macOS (free — no Apple Developer cert).
          # The dash identity tells codesign to stamp a self-contained
          # signature. Gatekeeper still shows the right-click-Open
          # prompt on first launch, but the bundle runs on any machine
          # after that one click. See docs/SIGNING_UPGRADE.md for the
          # paid-Notary upgrade path.
          APPLE_SIGNING_IDENTITY: "-"
          # Free (ed25519 / minisign) updater signing. With these set
          # and `bundle.createUpdaterArtifacts: true`, `tauri build`
          # emits a signed updater bundle plus a `.sig` and per-target
          # `latest.json` for the publish-updater-manifest job to merge.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target ${{ matrix.target.rust-target }} --bundles ${{ matrix.target.bundles }}

      - name: Collect Windows artifacts
        if: matrix.target.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-staging | Out-Null
          Get-ChildItem -Recurse `
            "apps/copythat-ui/src-tauri/target/${{ matrix.target.rust-target }}/release/bundle" `
            -Include *.msi,*.exe,*.zip,*.sig,latest.json `
            -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName -Destination release-staging }
          # Per-target manifest name so the four runners don't collide on
          # the release; publish-updater-manifest merges them into one.
          $lj = Join-Path release-staging latest.json
          if (Test-Path $lj) { Move-Item -Force $lj (Join-Path release-staging "latest-${{ matrix.target.label }}.json") }

      - name: Collect macOS artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-staging
          find "apps/copythat-ui/src-tauri/target/${{ matrix.target.rust-target }}/release/bundle" \
            -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.sig" -o -name "latest.json" \) \
            -exec cp {} release-staging/ \; || true
          # Per-target manifest name so the four runners don't collide on
          # the release; publish-updater-manifest merges them into one.
          [ -f release-staging/latest.json ] && mv -f release-staging/latest.json "release-staging/latest-${{ matrix.target.label }}.json" || true

      - name: Collect Linux artifacts
        if: matrix.target.os == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p release-staging
          find "apps/copythat-ui/src-tauri/target/${{ matrix.target.rust-target }}/release/bundle" \
            -type f \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.tar.gz" -o -name "*.sig" -o -name "latest.json" \) \
            -exec cp {} release-staging/ \; || true
          # Per-target manifest name so the four runners don't collide on
          # the release; publish-updater-manifest merges them into one.
          [ -f release-staging/latest.json ] && mv -f release-staging/latest.json "release-staging/latest-${{ matrix.target.label }}.json" || true

      - name: Linux GPG sign (optional, skipped if no key)
        if: matrix.target.os == 'ubuntu-latest'
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        shell: bash
        run: |
          if [ -z "$GPG_SIGNING_KEY" ]; then
            echo "No GPG_SIGNING_KEY secret; skipping detached signatures (this is the free-first default)."
            exit 0
          fi
          echo "$GPG_SIGNING_KEY" | gpg --batch --import
          for f in release-staging/*.AppImage release-staging/*.deb release-staging/*.rpm; do
            [ -e "$f" ] || continue
            gpg --batch --yes --detach-sign --armor "$f"
          done

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          files: |
            release-staging/*

      - name: Upload build artifacts (dry-run)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: actions/upload-artifact@v4
        with:
          name: copythat-${{ matrix.target.label }}
          path: release-staging/
          if-no-files-found: ignore

  # Updater-manifest publishing job. The updater endpoint configured in
  # tauri.conf.json is the GitHub Release asset
  # `…/releases/latest/download/latest.json`, so each runner's per-target
  # `latest-<label>.json` (uploaded by the build job) is merged here into
  # one universal `latest.json` and uploaded back to the same release.
  # Requires TAURI_SIGNING_PRIVATE_KEY + TAURI_SIGNING_PRIVATE_KEY_PASSWORD
  # repo secrets so the build job's bundles are signed (see that job's
  # env). Tracked in docs/SIGNING_UPGRADE.md.
  publish-updater-manifest:
    name: Publish updater manifest
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download per-target manifests from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p _release
          # The build job uploads one `latest-<label>.json` per runner;
          # gather them and merge into a single manifest the updater
          # plugin can consume from one endpoint.
          gh release download "$TAG" --pattern 'latest-*.json' --dir _release || true
          ls -la _release || true
      - name: Merge per-target latest.json files
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import glob, json, os, pathlib, sys

          # Hard allowlist of platform keys the Tauri updater plugin
          # recognizes; an attacker who controls a release-asset filename
          # could otherwise inject an arbitrary platforms[<key>] entry.
          ALLOWED_PLATFORMS = {
              "linux-x86_64",
              "darwin-x86_64", "darwin-aarch64",
              "windows-x86_64",
          }

          tag = os.environ["TAG"]
          version = tag.lstrip("v")
          out = {
              "version": version,
              "notes": f"Copy That {tag}. See CHANGELOG.md for details.",
              "pub_date": "",
              "platforms": {},
          }
          sources = sorted(glob.glob("_release/latest-*.json"))
          if not sources:
              # Fail loud rather than publish an empty manifest that would
              # make every installed client treat the release as "no
              # platforms available" and silently skip the update.
              print("FATAL: no `latest-*.json` artifacts found in _release/", file=sys.stderr)
              sys.exit(1)
          for src in sources:
              try:
                  data = json.loads(pathlib.Path(src).read_text())
              except Exception as e:
                  print(f"skip {src}: {e}", file=sys.stderr)
                  continue
              if not out["pub_date"]:
                  out["pub_date"] = data.get("pub_date", "")
              for platform_key, payload in data.get("platforms", {}).items():
                  if platform_key not in ALLOWED_PLATFORMS:
                      print(f"skip platform key not in allowlist: {platform_key!r}", file=sys.stderr)
                      continue
                  out["platforms"][platform_key] = payload
          if not out["platforms"]:
              print("FATAL: no allowed platforms after merge", file=sys.stderr)
              sys.exit(1)
          pathlib.Path("_release/latest.json").write_text(json.dumps(out, indent=2))
          print(json.dumps(out, indent=2))
          PYEOF
      - name: Upload merged latest.json to the GH Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" _release/latest.json --clobber

  # ------------------------------------------------------------------
  # Paid-signing upgrade hooks. Keep commented until revenue justifies
  # the subscription; the upgrade is a secret-management change plus
  # un-commenting a job, not a code change. Matches the guidance in
  # docs/SIGNING_UPGRADE.md.
  # ------------------------------------------------------------------

