# cargo-deny — license, dependency, and supply-chain gate.
#
# Phase 0 contract: every transitive dependency must use a permissive license.
# This file is what makes "$0 to build, commercially shippable" enforceable as
# the dependency tree evolves. CI runs `cargo deny check` and fails the build
# on any violation.
#
# Reference: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
all-features = true

[output]
feature-depth = 1

# ----- Licenses ---------------------------------------------------------------
#
# Allowlist only. Any license not in `allow` causes a hard failure. The list
# matches the Phase 0 cost-policy: GPL / AGPL / SSPL / BUSL / CC-BY-NC and
# any other non-permissive license is rejected.
[licenses]
version = 2
confidence-threshold = 0.92
# Forward-compatible: keep entries even when no current dep uses them, so a
# later phase pulling such a dep does not surprise us.
unused-allowed-license = "allow"
# Skip license checks for our own workspace crates (those marked
# `publish = false`). They carry the proprietary
# `LicenseRef-AllRightsReserved` identifier, which is intentionally not
# in the allowlist below — that allowlist governs *third-party*
# dependencies only.
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",            # Boost Software License 1.0 — permissive, OSI-approved,
                          # compatible with commercial distribution. Pulled in by
                          # `xxhash-rust` (added Phase 3 for xxHash3 verification).
    "ISC",
    "CC0-1.0",
    "0BSD",
    "Unlicense",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",            # file-scope copyleft only — acceptable for shipping
                          # a closed-source app that does not modify MPL files.
    "CDLA-Permissive-2.0", # Community Data License Agreement — Permissive 2.0.
                          # Linux-Foundation-authored, ODI-conformant permissive
                          # data license used by some data-carrying crates (e.g.
                          # `webpki-roots` / TLS root trust bundles pulled in
                          # transitively through Tauri's HTTP stack). Allows
                          # redistribution, modification, and closed-source
                          # use. https://cdla.dev/permissive-2-0/
]

# Per-crate exceptions — none for Phase 0; add here only with documented reason.
exceptions = []

# Phase 39 audit-pass — browser-accessible recovery UI introduces
# `axum` (MIT), `askama` + `askama_derive` + `askama_parser` (all
# MIT-OR-Apache-2.0), `tower` + `tower-http` (MIT), `matchit` (MIT-
# OR-Apache-2.0), `httpdate` (MIT-OR-Apache-2.0), `serde_path_to_error`
# (MIT-OR-Apache-2.0), and `axum-core` (MIT). Every transitive license
# is already covered by the allowlist above; no new entries needed.
# Adding the new top-level `copythat-recovery` crate is itself
# `LicenseRef-AllRightsReserved` like every other workspace crate
# (private.ignore = true skips it).

# ----- Bans -------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards         = "deny"
highlight         = "all"

# Crates we will never accept, regardless of license:
deny = []

# Skip duplicate-version warnings for crates where conflicts are inherited from
# the ecosystem and out of our control. Populate as needed; empty in Phase 0.
skip = []
skip-tree = []

# ----- Sources ----------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []

# ----- Advisories -------------------------------------------------------------
#
# Most entries below are "unmaintained" advisories (NOT vulnerabilities),
# inherited transitively from Tauri 2.x's Linux toolchain. We do not import
# any of these crates directly and cannot evict them from the tree until the
# upstream maintainer migrates. Re-audit at every Tauri minor bump and remove
# entries whose root crate has been replaced. New unmaintained advisories
# encountered later get added here with the same one-line provenance comment.
# Phase 42 audit-pass disposition is recorded in
# `docs/SECURITY_BACKLOG.md` § "Phase 42 advisory triage".
#
# Phase 36 also adds a single *vulnerability* exception for
# RUSTSEC-2023-0071 (Marvin Attack on the `rsa` crate, no constant-time
# upstream patch yet). Inherited transitively from three call sites:
#   - `age 0.11` (Phase 35 destination encryption — `rsa 0.9.10` is only
#     reached when the user picks an RSA SSH key recipient; ed25519 / age
#     X25519 recipients never hit `rsa`).
#   - `reqsign 0.16.5` via `opendal 0.54` (Phase 32 cloud sign — `rsa 0.9.10`
#     used to mint the GCS service-account JWT and S3-presigned-URL
#     signatures; signing happens locally before the request leaves the
#     machine).
#   - `russh 0.60` via `internal-russh-forked-ssh-key` (Phase 32f SFTP —
#     `rsa 0.10.0-rc.17` is only reached when a user supplies an RSA-format
#     OpenSSH private key for SFTP authentication; the actual SSH crypto
#     runs through `aws-lc-rs` which is not the vulnerable code path).
#   - `copythat-mobile` dev-dependencies (test-only RSA keypair generation
#     for the FCM RS256 signer round-trip; never shipped in release builds).
#
# Phase 42 added cloud (rustls TLS) + mobile (rustls TLS via reqwest) +
# age-recipient encryption to the surface. None of these change the
# Marvin Attack threat model:
#   - rustls TLS uses `ring` / `aws-lc-rs`, NEVER the `rsa` crate.
#   - `jsonwebtoken` (FCM RS256, used by mobile push) uses `ring`,
#     NEVER the `rsa` crate.
#   - russh SSH transport uses `aws-lc-rs`, NEVER the `rsa` crate.
# The `rsa` crate is only reached for *local* signing/decryption with
# user-supplied keys (age recipient decrypt, GCS service-account JWT
# mint, SFTP RSA-key authentication). The Marvin Attack requires the
# attacker to time many RSA operations over the network — CopyThat
# does not expose RSA timing to a remote attacker, the operations
# happen on the user's own machine, and the JWT / authentication
# response that ships afterwards reveals only that the signing
# completed (not its internal timing). The official `rsa` crate
# advisory text states the same: "local use on a non-compromised
# computer is fine". Re-audit and remove this entry the moment the
# `rsa` crate ships a constant-time release. See
# `docs/SECURITY_BACKLOG.md` § "Phase 42 advisory triage" for the
# detailed disposition.
[advisories]
version = 2
yanked  = "deny"
ignore = [
    # Phase 35 / 32 — Marvin Attack on `rsa` crate; see provenance
    # comment above. Local file-copying tool, no remote-observable
    # RSA timing.
    "RUSTSEC-2023-0071",
    # Phase 31 — `nix 0.19` getgrouplist OOB. Inherited transitively
    # from `battery 0.7` (Linux power source enumeration). The bug
    # only triggers on Linux when /etc/group lists >16 groups for the
    # current user — exploitation requires root-level edit access to
    # /etc/group, which is the same trust boundary as the file copy
    # operation itself. Re-audit when `battery` upgrades nix or when
    # we replace the crate with a direct sysfs reader.
    "RUSTSEC-2021-0119",
    # Phase 33 — `registry 1.3` archived by upstream. Inherited
    # transitively through `winfsp_wrs_sys` build script (Windows
    # mount-as-filesystem). No vulnerability, just maintenance signal.
    # `windows-registry` is the proposed replacement; tracked for the
    # winfsp_wrs maintainer.
    "RUSTSEC-2025-0026",
    # Phase 31 — `mach 0.3.2` archived. Inherited transitively through
    # `battery 0.7` on macOS for IOPMPowerSource lookups. No
    # vulnerability; maintenance signal only. Replacement candidate is
    # `mach2`, blocked on a `battery` crate upstream bump.
    "RUSTSEC-2020-0168",
    # Phase 33 — `async-std` discontinued. Originally inherited
    # through `fuser 0.15` on Linux; after the Phase 42 fuser 0.15→0.17
    # bump (which migrated to smol/tokio), the residual import comes
    # from `suppaftp 6.3` via `opendal 0.54`'s `services-ftp`. No
    # vulnerability; runtime swap is gated on suppaftp upstream.
    "RUSTSEC-2025-0052",
    # gtk-rs GTK3 binding family — Tauri 2.x Linux WebView (atk, gdk, gdk-sys,
    # gdkx11, gdkx11-sys, gdk-pixbuf, gdk-pixbuf-sys, gdkwayland-sys, gtk,
    # gtk-sys, gtk3-macros). Will clear when Tauri migrates Linux to GTK4.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0417",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error — superseded by proc-macro-error2; pulled in transitively.
    "RUSTSEC-2024-0370",
    # fxhash — superseded by rustc-hash 2.x; pulled in transitively.
    "RUSTSEC-2025-0057",
    # unic-* (unic-char-property, unic-char-range, unic-common, unic-ucd-ident,
    # unic-ucd-version) — superseded by ICU4X icu_* crates; pulled transitively.
    "RUSTSEC-2025-0075",
    "RUSTSEC-2025-0080",
    "RUSTSEC-2025-0081",
    "RUSTSEC-2025-0098",
    "RUSTSEC-2025-0100",
    # paste 1.0.15 — upstream archived. Inherited transitively through
    # `compio 0.13` → `compio-driver` / `-fs` / `-net` / `-runtime` /
    # `-io`, used by `copythat-platform`'s Windows IOCP fast path
    # (Phase 6+) and Phase 31 power probes. No vulnerability;
    # maintenance signal only. Replacement candidates `pastey` /
    # `with_builtin_macros` would require a compio upstream bump.
    # Re-audit when compio drops `paste` or migrates to a maintained
    # alternative.
    "RUSTSEC-2024-0436",
]
