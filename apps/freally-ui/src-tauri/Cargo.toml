[package]
name = "freally-ui"
# Multi-binary crate (the app + the Phase 17d `ct_elevate_probe` UAC harness):
# pin the default binary so cargo + the tauri v2 bundler package the APP, not
# the probe. Without this the bundler picks the explicit `[[bin]]` and fails
# with "failed to rename app binary ct_elevate_probe.exe".
default-run = "freally-ui"
description = "Freally File Manager v1.0.0 — Tauri 2.x application shell."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[lib]
name = "freally_ui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
freally-core = { path = "../../../crates/freally-core", version = "0.19" }
freally-hash = { path = "../../../crates/freally-hash", version = "0.19" }
freally-history = { path = "../../../crates/freally-history", version = "0.19" }
freally-platform = { path = "../../../crates/freally-platform", version = "0.19" }
freally-secure-delete = { path = "../../../crates/freally-secure-delete", version = "0.19" }
freally-settings = { path = "../../../crates/freally-settings", version = "0.19" }
# Phase 19b — filesystem-snapshot bridge (VSS / ZFS / Btrfs / APFS)
# wired into `CopyOptions::snapshot_hook` when the user opts into the
# "Use snapshot" locked-file policy.
freally-snapshot = { path = "../../../crates/freally-snapshot", version = "0.19" }
# Phase 20 — durable resume journal. Opened at app start; the runner
# attaches a per-job FreallyJournalSink to every CopyOptions so a
# crash mid-copy can resume from the last 50 ms checkpoint.
freally-journal = { path = "../../../crates/freally-journal", version = "0.19" }
# Phase 21 — bandwidth shaping. AppState owns a shared `Shape` whose
# rate is updated once a minute by a tokio interval task driven by
# the user's NetworkSettings.
freally-shape = { path = "../../../crates/freally-shape", version = "0.19" }
# Phase 25 — two-way sync with vector-clock conflict detection.
# AppState owns a map of configured pairs; each `start_sync` IPC
# spawns a runner task that emits sync-* events through Tauri.
freally-sync = { path = "../../../crates/freally-sync", version = "0.19" }
# Phase 26 — real-time filesystem watcher. Live-mirror mode spawns
# one watcher per sync pair; a debounced event triggers a re-sync.
freally-watch = { path = "../../../crates/freally-watch", version = "0.19" }
# Phase 31 — power-aware copying. AppState owns a PowerBus; a
# subscriber task maps PowerEvent into pause_all / resume_all / shape
# cap directives driven by the user's PowerPoliciesSettings.
freally-power = { path = "../../../crates/freally-power", version = "0.19" }
# Phase 47 — "why is this slow?" diagnostics. The diag_sampler task uses
# freally-diag's SystemSampler + classify_snapshot to emit job-diag
# events for the live speed-graph annotations.
freally-diag = { path = "../../../crates/freally-diag", version = "0.19" }
# Phase 32 — cloud backend matrix via OpenDAL. AppState owns the
# BackendRegistry + keychain-backed Credentials; IPC commands in
# cloud_commands.rs surface list/add/remove/test-connection.
freally-cloud = { path = "../../../crates/freally-cloud", version = "0.19" }
# Phase 33 — mount-as-filesystem. AppState owns the MountRegistry +
# an active NoopBackend (33b); real fuser / winfsp dispatch behind
# the crate's feature flags lands in Phase 33c.
freally-mount = { path = "../../../crates/freally-mount", version = "0.19" }
# Phase 34 — enterprise audit log export + WORM mode. AppState owns
# an `AuditRegistry` whose live `Arc<AuditSink>` is (re)built from
# `Settings::audit` at startup + on every `update_settings` flip.
# The runner records `JobStarted` / `JobCompleted` / `FileCopied`
# / `FileFailed` / `CollisionResolved` / `SettingsChanged` into
# the sink when one is active.
freally-audit = { path = "../../../crates/freally-audit", version = "0.19" }
# Phase 35 — destination encryption + on-the-fly compression. The
# runner builds a `FreallyCryptHook` from `Settings::crypt` and
# attaches it to every queued job's `CopyOptions::transform`.
freally-crypt = { path = "../../../crates/freally-crypt", version = "0.19" }
# Phase 37 follow-up — desktop-side mobile companion. AppState owns
# a MobileRegistry; `mobile_commands` IPC handlers spin up the
# pair-server, return the QR PNG bytes, complete the SAS, and
# dispatch APNs / FCM pushes when a job finishes.
freally-mobile = { path = "../../../crates/freally-mobile", version = "0.19" }
# Phase 39 — browser-accessible recovery UI. AppState owns a
# RecoveryRegistry whose live `JoinHandle` reflects the current
# Settings → Advanced → Recovery toggle. Started/stopped via
# `recovery_commands::recovery_apply` at boot + on every
# `update_settings` flip.
freally-recovery = { path = "../../../crates/freally-recovery", version = "0.19" }
# Phase 48 — server mode + observability. AppState owns a
# `ServerRegistry` whose live `ServerHandle` reflects the current
# Settings → Server panel state. Started/stopped via
# `server_commands::{server_start, server_stop}` from the GUI.
freally-server = { path = "../../../crates/freally-server", version = "0.19" }
# Phase 46.6 — Settings → Plugins UI. The Tauri shell owns the
# per-user plugin store on disk (manifest + .wasm + state.toml per
# plugin) and surfaces it through `plugin_commands.rs`. The runtime
# itself lives in `freally-plugin`; the IPC layer here is responsible
# for filesystem layout + persistence of enable/grant state, while
# `PluginManifest::parse` handles validation.
freally-plugin = { path = "../../../crates/freally-plugin", version = "0.19" }
# Phase 39 — `recovery_commands` opens the default chunk store path
# the same way `lib.rs` will hand it to a future per-job sink, so
# the recovery server can pull manifests without a second config
# knob. The crate is otherwise consumed only by the engine's
# `FreallyChunkSink`; listing it here makes the dep explicit.
freally-chunk = { path = "../../../crates/freally-chunk", version = "0.19" }
# Phase 17d — privilege-separated helper. Used by retry_elevated and
# (future) shell-extension install/uninstall flows.
freally-helper = { path = "../../../crates/freally-helper", version = "0.19" }
# Phase 37 follow-up — `RemoteControl` is async-trait. The impl
# in `mobile_commands.rs` re-applies the macro on the impl block,
# so the host crate needs the dep too.
async-trait = "0.1"
base32 = "0.5"
# Phase 35 — `secrecy::SecretString` wraps the passphrase from the
# Settings → Encryption prompt so it never leaks into debug / serde
# output.
secrecy = "0.10"
# Phase 34 — process-wide tracing-subscriber registry. The audit
# feature installs `AuditLayer` only when enabled; the default fmt
# layer is now installed at boot (post wave-2 observability rollout)
# so platform / engine / runner diagnostics route to stderr through
# the standard subscriber instead of bare `eprintln!`. Filter is
# controlled by `FREALLY_LOG=<level>` (defaults to `info`).
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["registry", "env-filter", "fmt"] }
# Phase 34 — hostname for audit events (JobStarted/SettingsChanged
# carry host + user). BSD-3-Clause.
gethostname = "1"
# Phase 34 — SHA-256 of the settings TOML serialisation for
# SettingsChanged before/after hashes. `sha2` already in the tree
# via `freally-cloud`.
sha2 = "0.10"
hex = "0.4"
# Phase 34 — serialise the live settings to TOML before hashing
# them so the fingerprint is deterministic across platforms. Only
# direct dep add in the UI crate today; settings stores via the
# crate's own TOML round-trip. Phase 42 dep-audit bumped 0.8 → 0.9
# to share `toml v0.9.x` with `freally-settings`, eliminating the
# duplicate `toml v0.8.2` resolution from the workspace lockfile.
toml = "0.9"
# Phase 25 — pair IDs are random v4 UUIDs generated on the Tauri
# side at `add_sync_pair` time.
uuid = { version = "1", features = ["v4"] }
chrono = { version = "0.4", default-features = false, features = ["clock", "alloc"] }
# Phase 22 — thumbnail generation for the aggregate conflict dialog.
# `image` decodes jpg/png/gif/bmp/webp and downscales via bilinear
# `thumbnail()`; `base64` emits the PNG bytes as a `data:` URL so
# the Svelte component can drop the result straight into an `<img>`
# without a second fetch. Both crates are already in the workspace
# Cargo.lock transitively (image via arboard, base64 via tauri);
# listing them explicitly documents the direct dependency.
image = { version = "0.25", default-features = false, features = [
    "jpeg",
    "png",
    "gif",
    "bmp",
    "webp",
] }
base64 = "0.22"
# Phase 46.6 — `plugin_install_from_url` BLAKE3-hashes the downloaded
# .wasm bytes so the user's confirmation gate can pin a known-good
# digest. Already in the workspace tree via freally-core /
# freally-cloud / freally-hash; listing it explicitly here
# documents the direct dependency.
blake3 = "1"
# Phase 46.6 — `plugin_install_from_url` downloads the .wasm + adjacent
# plugin.toml over HTTPS. `default-features = false` strips the
# native-tls dep we don't want; `rustls-tls` matches what
# freally-recovery + freally-cloud already use, so the workspace
# resolves to one TLS stack. MIT/Apache-2.0.
reqwest = { version = "0.12", default-features = false, features = [
    "rustls-tls",
] }
# Phase 22 — `globset` validates per-pattern rules at IPC entry so
# a malformed glob surfaces an error before it can wedge a running
# job. `directories` resolves the platform-appropriate cache dir
# for the thumbnail cache. Both are already workspace deps via
# `freally-core` / `freally-settings`.
globset = "0.4"
directories = "6"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = ["tray-icon"] }
tauri-plugin-dialog = "2"
thiserror = "2"
tokio = { version = "1", features = [
    "fs",
    "io-util",
    "macros",
    "net",
    "rt",
    "rt-multi-thread",
    "sync",
    "time",
] }

# Single-instance is the transport the Phase 7 shell-extension hosts
# use: a second invocation (e.g. from a Windows IExplorerCommand DLL)
# is intercepted and argv is forwarded to the already-running app,
# which translates it into job-queue enqueues. Not available on
# Android / iOS — Tauri gates the plugin to desktop targets.
[target.'cfg(any(target_os = "windows", target_os = "macos", target_os = "linux"))'.dependencies]
tauri-plugin-single-instance = "2"
# Post-Phase-12 — system-wide "paste files via Freally File Manager" shortcut.
# Registers a configurable combo (default CmdOrCtrl+Shift+V) that
# reads file URLs off the OS clipboard and routes them through the
# same staging-dialog path the drag-drop and shell-extension flows
# already use.
tauri-plugin-global-shortcut = "2"
# Phase 15 — auto-update via Tauri's signed-manifest updater. Desktop-
# only (the plugin is gated to those targets upstream). Handles the
# actual download + signature verification + install-on-quit flow;
# we layer our own manifest pre-fetch + 24 h throttle on top in
# `updater.rs`.
tauri-plugin-updater = "2"

# Windows-only clipboard reader: raw CF_HDROP access via
# `windows-rs`. Nothing else in the UI crate needs the Win32 surface,
# so the dep is scoped to this target triple.
[target.'cfg(windows)'.dependencies]
# Matches the version `freally-shellext` already pins, so the
# workspace uses one resolution of the Win32 bindings.
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_System_DataExchange",
    "Win32_System_Memory",
    "Win32_System_Ole",
    "Win32_UI_Shell",
] }
# Phase 40 — `instance_broker.rs` second-instance fast-bail
# infrastructure. Named-pipe IPC + named mutex via the
# already-in-workspace windows-sys 0.59 binding.
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_Storage_FileSystem",
    "Win32_System_Pipes",
    "Win32_System_Threading",
] }
# Phase 42 — per-message HMAC-SHA256 authentication on the broker
# pipe so a same-user hostile process can't forge `{argv: [...] }`
# job-injection messages. `sha2` is already a top-level dep above
# (Phase 34); `hmac` and `getrandom` come in here.
hmac = "0.12"
getrandom = "0.2"

# macOS-only clipboard reader: NSPasteboard via the modern `objc2`
# bindings. `objc2-foundation` covers NSArray / NSString / NSURL and
# `objc2-app-kit` wraps NSPasteboard itself.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.6"
objc2-foundation = { version = "0.3", features = [
    "NSArray",
    "NSString",
    "NSURL",
] }
objc2-app-kit = { version = "0.3", features = [
    "NSPasteboard",
] }

# Linux-only clipboard reader: `arboard` speaks both X11 and Wayland
# (via `wayland-data-control`), so the same call works on GNOME,
# KDE, and XFCE without per-distro branching. File lists come across
# as text/uri-list; the parser lives in `clipboard.rs`.
[target.'cfg(target_os = "linux")'.dependencies]
arboard = { version = "3", features = ["wayland-data-control"] }

[dev-dependencies]
tempfile = "3"
freally-settings = { path = "../../../crates/freally-settings", version = "0.19" }
freally-platform = { path = "../../../crates/freally-platform", version = "0.19" }
# Phase 22 smoke test — seeds colliding trees with explicit mtimes to
# exercise the `OverwriteIfNewer` rule branch. `filetime` is already a
# workspace dep via `freally-core` and `freally-secure-delete`.
filetime = "0.2"
# Phase 18 E2E smoke uses walkdir to independently re-count the copied
# tree as a ground-truth cross-check on `TreeReport.files` / `.bytes`.
# Already a transitive workspace dep via `freally-core` / `-secure-delete`;
# listing it explicitly here keeps the smoke test's deps legible.
walkdir = "2"
tokio = { version = "1", features = [
    "fs",
    "macros",
    "rt",
    "rt-multi-thread",
    "sync",
    "test-util",
    "time",
] }

# Phase 7a smoke test lives at the workspace root (mirrors the
# convention set by Phase 6's `freally-platform` crate).
[[test]]
name = "phase_07a_cli_enqueue"
path = "../../../tests/smoke/phase_07a_cli_enqueue.rs"

# Phase 8 smoke test — error handling + collision UX. Drives the
# engine + `ErrorRegistry` without booting Tauri.
[[test]]
name = "phase_08_errors"
path = "../../../tests/smoke/phase_08_errors.rs"

# Phase 11a smoke test — i18n placeable parity + required-key guard.
# Pure-filesystem test; no Tauri / webview involved.
[[test]]
name = "phase_11a_i18n"
path = "../../../tests/smoke/phase_11a_i18n.rs"

# Phase 11c smoke test — runtime substitute-pipeline check for
# every locale + required direction flag. Pure-filesystem; mirrors
# the TS `substitute()` so we don't need to boot a webview.
[[test]]
name = "phase_11c_substitute"
path = "../../../tests/smoke/phase_11c_substitute.rs"

# Phase 12 smoke test — settings persistence + profile round-trip
# + effective-buffer-size clamp. Pure-filesystem; exercises the
# `freally-settings` crate through the same surface the Tauri IPC
# handlers use.
[[test]]
name = "phase_12_settings"
path = "../../../tests/smoke/phase_12_settings.rs"

# Phase 13 smoke test — engine-throughput floor. Runs a 32 MiB
# synthetic copy and fails if the observed throughput drops below
# 20 MiB/s, catching the "accidentally slowed the engine by 10×"
# class of regression. Requires `freally-platform` in dev-deps
# because it exercises the real `PlatformFastCopyHook` rather than
# the pure-async fallback.
[[test]]
name = "phase_13_bench"
path = "../../../tests/smoke/phase_13_bench.rs"

# Phase 15 smoke test — auto-update manifest pre-fetch. Spins up a
# local HTTP listener serving a v99.0.0 fixture and asserts the
# updater module resolves + parses + is-strictly-newer within the
# 10 s bound. Exercises `freally_ui_lib::updater` — the pure-Rust
# surface the UI uses to show "Update available" before the Tauri
# updater plugin takes over for the signed install.
[[test]]
name = "phase_15_update"
path = "../../../tests/smoke/phase_15_update.rs"

# Phase 16 smoke test — free-first packaging tripwire. Filesystem-only:
# asserts `release.yml` never wires a paid-signing service outside
# commented-out upgrade blocks, `tauri.conf.json` uses ad-hoc codesign
# for macOS, every packaging manifest exists, and `docs/SIGNING_UPGRADE.md`
# documents the enable-when steps.
[[test]]
name = "phase_16_package"
path = "../../../tests/smoke/phase_16_package.rs"

# Phase 18 end-to-end smoke — seeds a 500-file tree (or 10 000 with
# `FREALLY_PHASE18_FULL=1`), copy_tree-with-BLAKE3-verify, records the
# job in an in-memory history DB, round-trips CSV export, then
# shred_tree's the source and asserts final state. Covers the
# engine-level half of the Phase 18 prompt's "install → copy → verify →
# secure-delete → history → CSV → uninstall" brief. `install` /
# `uninstall` are exercised manually against the release.yml artifacts
# per `docs/RELEASE_CHECKLIST.md`.
[[test]]
name = "phase_18_e2e"
path = "../../../tests/smoke/phase_18_e2e.rs"

# Phase 22 smoke test — aggregate conflict dialog v2. Drives the
# engine with a `ConflictPolicy::Prompt` tree + a `ConflictProfile`-
# backed simulator that mirrors the runner's rule-based
# auto-resolution. Verifies the brief's 50-collision mix
# (20 *.txt skip / 15 *.docx newer-wins / 15 misc keep-both) +
# ProfileStore round-trip + re-run-without-prompts. Lives in the
# UI crate so the `freally-settings` dep is already available.
[[test]]
name = "phase_22_conflict_batch"
path = "../../../tests/smoke/phase_22_conflict_batch.rs"

# Phase 28 smoke test — tray-resident Drop Stack. Exercises the
# `DropStackRegistry` through the same code path the Tauri IPC
# commands call: add / save / reload / revalidate-missing /
# clear. Shell-script wrappers named in the brief can't be driven
# headlessly in CI; this Rust smoke covers the four invariants
# identically.
[[test]]
name = "phase_28_dropstack"
path = "../../../tests/smoke/phase_28_dropstack.rs"

# Phase 29 smoke test — spring-loaded folders + native DnD polish.
# The brief's Playwright + tauri-driver harness is deferred; this
# Rust smoke exercises the DndSettings round-trip, the
# `effective_spring_ms` clamp, and the Fluent key presence + parity
# across all 18 locales. See the smoke file header for the rationale.
[[test]]
name = "phase_29_dnd"
path = "../../../tests/smoke/phase_29_dnd.rs"

# Phase 17e — IPC argument audit + canonicalisation. Exercises
# `ipc_safety::validate_ipc_path*`, asserts every locale carries the
# new `err-path-invalid-encoding` Fluent key, and walks
# `commands.rs` to confirm every path-typed `#[tauri::command]`
# routes through one of the gate helpers (drift tripwire).
[[test]]
name = "phase_17e_ipc_audit"
path = "../../../tests/smoke/phase_17e_ipc_audit.rs"

# Phase 46.6 smoke — Settings → Plugins UI IPC layer. Exercises the
# install/enable/disable + grant/revoke round-trips against a
# tempdir-backed plugin store, plus the 17-key Fluent parity guard
# across all 18 shipped locales.
#
# Filename note: `phase_46_plugin_ui` (no `patch`/`setup`/`install`/
# `update` substring) keeps the Windows test binary clear of the
# UAC installer-detection heuristic.
[[test]]
name = "phase_46_plugin_ui"
path = "../../../tests/smoke/phase_46_plugin_ui.rs"

# Phase 17d — manual UAC-probe (dev-only; NOT shipped). Gated behind the
# `elevate-probe` feature via required-features, so `cargo build`,
# `cargo test --workspace`, and the app/release bundles never build it.
# It calls the real `elevate::elevated_retry`, firing the genuine UAC /
# pkexec / osascript consent prompt. See docs/MANUAL-UAC-TEST.md. (The
# binary name deliberately avoids the install/setup/update/patch
# substrings that trip Windows installer-detection auto-elevation.)
[features]
elevate-probe = []

# A manual UAC/elevation test harness (docs/MANUAL-UAC-TEST.md), NOT part of
# the shipped app. Kept as an `[[example]]` rather than a `[[bin]]` so the
# tauri v2 bundler doesn't try to package it (it enumerates bin targets
# regardless of required-features and fails when this one isn't built). Build
# with `cargo build -p freally-ui --example ct_elevate_probe --features elevate-probe`.
[[example]]
name = "ct_elevate_probe"
path = "examples/ct_elevate_probe.rs"
required-features = ["elevate-probe"]
