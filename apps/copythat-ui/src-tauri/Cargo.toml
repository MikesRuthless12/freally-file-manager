[package]
name = "copythat-ui"
description = "Copy That 2026 — Tauri 2.x application shell."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = false

[lints]
workspace = true

[lib]
name = "copythat_ui_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
copythat-core = { path = "../../../crates/copythat-core", version = "0.1" }
copythat-hash = { path = "../../../crates/copythat-hash", version = "0.1" }
copythat-history = { path = "../../../crates/copythat-history", version = "0.1" }
copythat-secure-delete = { path = "../../../crates/copythat-secure-delete", version = "0.1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
thiserror = "2"
tokio = { version = "1", features = [
    "fs",
    "macros",
    "rt",
    "rt-multi-thread",
    "sync",
    "time",
] }

# Single-instance is the transport the Phase 7 shell-extension hosts
# use: a second invocation (e.g. from a Windows IExplorerCommand DLL)
# is intercepted and argv is forwarded to the already-running app,
# which translates it into job-queue enqueues. Not available on
# Android / iOS — Tauri gates the plugin to desktop targets.
[target.'cfg(any(target_os = "windows", target_os = "macos", target_os = "linux"))'.dependencies]
tauri-plugin-single-instance = "2"

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = [
    "fs",
    "macros",
    "rt",
    "rt-multi-thread",
    "sync",
    "test-util",
    "time",
] }

# Phase 7a smoke test lives at the workspace root (mirrors the
# convention set by Phase 6's `copythat-platform` crate).
[[test]]
name = "phase_07a_cli_enqueue"
path = "../../../tests/smoke/phase_07a_cli_enqueue.rs"

# Phase 8 smoke test — error handling + collision UX. Drives the
# engine + `ErrorRegistry` without booting Tauri.
[[test]]
name = "phase_08_errors"
path = "../../../tests/smoke/phase_08_errors.rs"

# Phase 11a smoke test — i18n placeable parity + required-key guard.
# Pure-filesystem test; no Tauri / webview involved.
[[test]]
name = "phase_11a_i18n"
path = "../../../tests/smoke/phase_11a_i18n.rs"
