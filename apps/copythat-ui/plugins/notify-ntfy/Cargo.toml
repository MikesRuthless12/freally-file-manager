# Empty `[workspace]` table — required so cargo treats this manifest
# as a standalone package and does NOT try to look up the host
# workspace at C:/Users/miken/Desktop/Havoc Software/CopyThat2026.
[workspace]

[package]
name = "notify-ntfy"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "LicenseRef-AllRightsReserved"
authors = ["Copy That Contributors"]
description = "Phase 46.5 sample plugin: publish job summary to an ntfy.sh topic."
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", default-features = false, features = ["derive", "alloc"] }
serde_json = { version = "1", default-features = false, features = ["alloc"] }

[profile.release]
opt-level = "s"
lto = "fat"
codegen-units = 1
panic = "abort"
strip = "symbols"
