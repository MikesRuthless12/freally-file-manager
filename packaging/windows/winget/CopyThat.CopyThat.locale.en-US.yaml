ShortDescription: Byte-exact cross-platform file copier (Rust + Tauri 2).
Description: |
  Copy That v1.25.0 is a lightweight, cross-platform, async, byte-exact
  file and folder copier. Matches every TeraCopy feature while staying
  as fast as — or faster than — Explorer, Finder, cp, and rsync for
  typical desktop workloads. Ships verify (CRC32/MD5/SHA/BLAKE3/xxHash),
  reflink clones, shell integration, SQLite history, multi-pass secure
  delete, and a 18-language UI.
